<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Approved</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        h1 { color: #0B2F78; }
        p { margin-bottom: 1rem; }
        .button { background-color: #F97316; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; display: inline-block; margin-top: 15px; font-weight: bold; }
        .id-label { font-size: 14px; color: #555; margin-top: 20px; margin-bottom: 0; text-transform: uppercase; letter-spacing: 1px; }
        .id-value { font-size: 22px; font-weight: bold; color: #0B2F78; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello {{fullName}},</h1>
        <p>Congratulations! Your membership with Shri Ram Youth Foundation has been approved.</p>
        
        <p class="id-label">Membership ID</p>
        <p class="id-value">{{certificateNumber}}</p>

        <p>Click the button below to view and download your official membership certificate.</p>
        <a href="{{certificateLink}}" class="button">Download Certificate</a>
        
        <p style="margin-top: 30px;">Regards,<br>Shri Ram Youth Foundation</p>
    </div>
</body>
</html>
